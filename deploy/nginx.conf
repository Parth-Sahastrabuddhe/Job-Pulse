# Maps the Upgrade header so WebSocket connections set `Connection: upgrade`
# while normal requests use `Connection: close` (an unconditional `upgrade`
# defeats upstream keep-alive). Lives at http{} scope via the sites-enabled include.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name jobpulse.app www.jobpulse.app;

    # After running certbot (see below), uncomment to force HTTPS:
    # return 301 https://$host$request_uri;

    # Security headers (sent on plain HTTP today; HSTS is added in the 443 block
    # once TLS is enabled, since browsers ignore HSTS over HTTP).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

